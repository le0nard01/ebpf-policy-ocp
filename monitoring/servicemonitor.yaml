apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: ebpf-exporter
  namespace: ebpf-exporter
  labels:
    app.kubernetes.io/name: ebpf-exporter
spec:
  namespaceSelector:
    matchNames:
      - ebpf-exporter
  selector:
    matchLabels:
      app.kubernetes.io/name: ebpf-exporter
      app.kubernetes.io/instance: ebpf-exporter
  endpoints:
    - port: metrics
      path: /metrics
      interval: 30s
      scheme: http