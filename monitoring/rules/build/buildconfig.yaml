apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: ebpf-exporter
  namespace: ebpf-exporter
---
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: ebpf-exporter-build
  namespace: ebpf-exporter
spec:
  source:
    type: Git
    git:
      uri: https://github.com/le0nard01/ebpf-policy-ocp.git
    contextDir: monitoring/rules/
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: build/Containerfile
  output:
    to:
      kind: ImageStreamTag
      name: ebpf-exporter:latest
  triggers:
    - type: ConfigChange
