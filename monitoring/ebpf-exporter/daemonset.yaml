kind: ServiceAccount
apiVersion: v1
metadata:
  name: ebpf-exporter
  namespace: ebpf-exporter
---
kind: DaemonSet
apiVersion: apps/v1
metadata:
  name: ebpf-exporter
  namespace: ebpf-exporter
spec:
  selector:
    matchLabels:
      app.kubernetes.io/instance: ebpf-exporter
      app.kubernetes.io/name: ebpf-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: ebpf-exporter
        app.kubernetes.io/name: ebpf-exporter
    spec:
      restartPolicy: Always
      serviceAccountName: ebpf-exporter
      containers:
        - resources: {}
          terminationMessagePath: /dev/termination-log
          name: ebpf-exporter
          command:
            - /ebpf_exporter
          securityContext:
            privileged: true
          ports:
            - name: metrics
              containerPort: 9435
              protocol: TCP
          imagePullPolicy: IfNotPresent
          volumeMounts:
            - name: kernel
              mountPath: /sys/kernel/debug
            - name: modules
              mountPath: /lib/modules/
          terminationMessagePolicy: File
          image: 'image-registry.openshift-image-registry.svc:5000/ebpf-exporter/ebpf-exporter:latest'
          args:
            - '--config.dir'
            - /examples
            - '--web.listen-address'
            - '0.0.0.0:9435'
            - '--config.names'
            - accept-latency
      automountServiceAccountToken: false
      serviceAccount: ebpf-exporter
      volumes:
        - name: kernel
          hostPath:
            path: /sys/kernel/debug
            type: Directory
        - name: modules
          hostPath:
            path: /lib/modules/
            type: Directory
