kind: ServiceAccount
apiVersion: v1
metadata:
  name: ebpf-exporter
  namespace: ebpf-exporter
---
kind: DaemonSet
apiVersion: apps/v1
metadata:
  name: ebpf-exporter
  namespace: ebpf-exporter
spec:
  selector:
    matchLabels:
      app.kubernetes.io/instance: ebpf-exporter
      app.kubernetes.io/name: ebpf-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: ebpf-exporter
        app.kubernetes.io/name: ebpf-exporter
    spec:
      restartPolicy: Always
      serviceAccountName: ebpf-exporter
      initContainers:
        - name: git-sync
          image: registry.access.redhat.com/ubi9/git
          command:
            - /bin/sh
            - -c
            - |
              git clone https://github.com/seu/repo.git /config
          volumeMounts:
            - name: config
              mountPath: /config
      containers:
        - resources: {}
          terminationMessagePath: /dev/termination-log
          name: ebpf-exporter
          command:
            - /ebpf_exporter
          securityContext:
            privileged: true
          ports:
            - name: metrics
              containerPort: 9435
              protocol: TCP
          imagePullPolicy: IfNotPresent
          volumeMounts:
            - name: kernel
              mountPath: /sys/kernel/debug
            - name: modules
              mountPath: /lib/modules/
            - name: config
              mountPath: /config
          terminationMessagePolicy: File
          image: 'ghcr.io/cloudflare/ebpf_exporter:latest'
          args:
            - '--config.dir'
            - /examples/
            - '--web.listen-address'
            - '0.0.0.0:9435'
            - '--config.names'
            - 'timers,uprobe,usdt,shrinklat,biolatency,accept-latency,bpf-jit,cachestat,cgroup,llcstat,raw-tracepoints,tcp-syn-backlog,tcp-window-clamps'
      automountServiceAccountToken: false
      serviceAccount: ebpf-exporter
      volumes:
        - name: config
          emptyDir: {}
        - name: kernel
          hostPath:
            path: /sys/kernel/debug
            type: Directory
        - name: modules
          hostPath:
            path: /lib/modules/
            type: Directory